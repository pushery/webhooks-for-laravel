name: Bug report
description: Report a defect in Webhooks for Laravel.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please fill in the details below so the issue can be reproduced.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: The smallest set of steps that triggers the problem. A failing test or a minimal repository is ideal.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include any exception message and stack trace. Never paste real tokens, secrets, or credentials.
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: e.g. v0.1.0
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: e.g. 8.4.3
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: e.g. 13.2.0
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am using a supported version (PHP ^8.4, Laravel ^13).
          required: true
        - label: This is not a security vulnerability (those are reported privately, see SECURITY.md).
          required: true
